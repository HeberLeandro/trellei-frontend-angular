
<div class="grid-nogutter flex flex-wrap surface justify-content-center align-items-start h-screen">
    <div class="flex flex-column col-12 p-0 h-auto">
        <app-header-bar></app-header-bar>
    </div>

    <div class="col-11 h-30rem flex lg:col-8 justify-content-center">

        <div class="grid shadow-8">
            <div class="flex col-6 bg-primary justify-content-center align-items-center logo-div border-round-left">
                <div class="">
                    <p-image  class="border-round p-0 login-logo"
                        src="assets/icons/Trellei.png" 
                        alt="Image"
                        sizes="1.9rem"  />
                </div>
            </div>

            <div class="col-6 surface-50 border-round-right">
                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="formgrid grid align-items-center justify-content-center ">
                        <div class="field col-10">
                            <h1 class="mb-1">Sing In</h1>
                            <span class="text-sm">Don't have an account? 
                                <p-button [styleClass]="'linkButton p-0 text-sm'" 
                                    label="Create one" 
                                    [link]="true" routerLink="/signup" />
                            </span>
                        </div>
                        <div class="field col-10 pt-2">
                            <label for="email">Email:</label>
                            <input id="email" type="email" formControlName="email"
                                class="text-base text-color surface-overlay p-2 
                                    border-1 border-solid surface-border border-round
                                    appearance-none outline-none focus:border-primary w-full">
                        </div>
                        <div class="field col-10">
                            <label for="password">Password:</label>
                            <input id="password" type="password" formControlName="password"
                                class="text-base text-color surface-overlay p-2 border-1 
                                    border-solid surface-border border-round appearance-none 
                                    outline-none focus:border-primary w-full">
                        </div>
                        <div class="field col-10">
                            <p-checkbox inputId="rememberMe" formControlName="rememberMe" [binary]="true" ></p-checkbox> 
                            <label class="ml-2 mb-0" for="rememberMe">Remember me</label>
                        </div>
                        <div class="field col-10 pt-3">
                            <p-button label="Sing In" type="submit" [disabled]="loginForm.invalid" />
                        </div>
                </form>

            </div>

        </div>
    </div>



</div>
