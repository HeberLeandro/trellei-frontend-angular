<div class="flex flex-column align-items-end p-2 header col-12 p-0 bg-secondary">

    <div class="flex flex-grow-1 justify-content-between w-full">

        <div></div>
        <div class="align-items-center justify-content-center flex">
            <p-image  class="flex border-round-xs px-3 py-2 app-logo"
                src="/assets/icons/Trellei.png" 
                alt="Image" />
        </div>

        <div class="flex align-items-center">

                <div class="mr-3">
                    <button id="btn-theme" (click)="changeTheme()" class="pi pi-sun flex flex-shrink-0 px-link border-1 border-solid w-2rem h-2rem surface-border border-round surface-card align-items-center justify-content-center transition-all transition-duration-300 hover:border-primary"></button>
                </div>
                <div class="mr-1" *ngIf="showUserMenu">
                    <p-menu  #menu [model]="items" [popup]="true"></p-menu>
                    <p-button [styleClass]="'surface-card text-color'" (onClick)="menu.toggle($event)" icon="pi pi-user" size="small" badgeClass="bg-white" [rounded]="true"></p-button>
                </div>

        </div>

    </div>


</div>
